services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: workboard-oracle
    ports:
      - "${DB_PORT:-1521}:1521"
    environment:
      ORACLE_PASSWORD: ${DB_PASSWORD}
      APP_USER: ${DB_USER}
      APP_USER_PASSWORD: ${DB_USER_PASSWORD}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  oracle-data:
